<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blurb</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="Beautiful collaborative gists for humans and agents." />
  <!-- Open Graph -->
  <meta property="og:site_name" content="Blurb" />
  <meta property="og:title" content="Blurb" />
  <meta property="og:description" content="Beautiful collaborative gists for humans and agents." />
  <meta property="og:image" content="https://blurb.md/og.png" />
  <meta property="og:type" content="website" />
  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Blurb" />
  <meta name="twitter:description" content="Beautiful collaborative gists for humans and agents." />
  <meta name="twitter:image" content="https://blurb.md/og.png" />
</head>
<body>
  <script>
    // Apply theme before first paint to prevent flash
    (function() {
      var t = localStorage.getItem('blurb-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      var d = document.documentElement;
      if (t === 'light') {
        d.style.setProperty('--editor-bg', '#ffffff');
        d.style.setProperty('--editor-fg', '#37352f');
        d.style.setProperty('--widget-border', '#e3e2de');
        d.style.setProperty('--sidebar-bg', '#fbfbfa');
      } else {
        d.style.setProperty('--editor-bg', '#1a1816');
        d.style.setProperty('--editor-fg', '#e8e6e3');
        d.style.setProperty('--widget-border', '#333');
        d.style.setProperty('--sidebar-bg', '#1a1816');
      }
      d.style.background = d.style.getPropertyValue('--editor-bg');
      d.style.color = d.style.getPropertyValue('--editor-fg');
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
